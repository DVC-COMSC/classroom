name: Request a COMSC140 repo
description: Get your personal repo for a COMSC140 assignment. Register first if you have not.
title: "request-comsc140: "
body:
  - type: markdown
    attributes:
      value: |
        ### Request your COMSC140 assignment repo
        Pick the assignment. Your GitHub username is captured automatically.
        Not registered yet? Open the **Register** form first.
  - type: dropdown
    id: assignment
    attributes:
      label: Assignment
      description: (Auto-generated from config.json — do not hand-edit.)
      options:
        - A51
    validations:
      required: true
