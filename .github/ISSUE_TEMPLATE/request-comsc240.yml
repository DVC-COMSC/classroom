name: Request a COMSC240 repo
description: Get your personal repo for a COMSC240 assignment. Register first if you have not.
title: "request-comsc240: "
body:
  - type: markdown
    attributes:
      value: |
        ### Request your COMSC240 assignment repo
        Pick the assignment. Your GitHub username is captured automatically.
        Not registered yet? Open the **Register** form first.
  - type: dropdown
    id: assignment
    attributes:
      label: Assignment
      description: (Auto-generated from config.json — do not hand-edit.)
      options:
        - A00
        - A05
        - M1QP1
        - M1QP2
        - A51
        - A52
        - A53
        - A54
        - M2QP1
        - M2QP2
        - M2QP3
        - A71
        - A72
        - A73
        - Q7P1
        - Q7P2
        - Final-Exam
    validations:
      required: true
